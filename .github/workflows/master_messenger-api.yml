name: Build and deploy .NET Core + Angular apps to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # --------------------------
  # 1️⃣ Build .NET Core API
  # --------------------------
  build-dotnet:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build .NET Core
        run: dotnet build Messenger/Messenger.Api --configuration Release

      - name: Publish .NET Core
        run: dotnet publish Messenger/Messenger.Api -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload .NET artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # --------------------------
  # 2️⃣ Build Angular app
  # --------------------------
  build-angular:
    runs-on: ubuntu-latest
    needs: build-dotnet
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22' 
  
      - name: Install dependencies
        run: npm ci
        working-directory: Messenger.App
  
      - name: Install Angular CLI
        run: npm install -g @angular/cli
  
      - name: Build Angular
        run: npm run build -- --configuration production
        working-directory: Messenger.App
  
      - name: Upload Angular artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: Messenger.App/dist/messenger.app

  # --------------------------
  # 3️⃣ Deploy .NET Core to Azure Web App
  # --------------------------
  deploy-dotnet:
    runs-on: windows-latest
    needs: build-dotnet
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download .NET artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_596CCCBD71F24FF09908B204EF7884B0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B14A1E58E76947F2AD77F52E9FD67575 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DA4E1AFF88FD4888A2BAEBD629805E89 }}

      - name: Deploy .NET Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'messenger-api'
          slot-name: 'Production'
          package: .
  
  deploy-angular:
    runs-on: ubuntu-latest
    needs: build-angular
  
    steps:
      - name: Download Angular artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-app
          path: ./angular-build
  
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e., PR comments)
          action: "upload"
          app_location: "Messenger.App"            # путь к исходникам Angular (не обязательно к dist)
          output_location: "Messenger.App/dist/messenger.app"  # путь к собранному артефакту
          skip_app_build: true                      # сборка уже выполнена на предыдущем шаге



