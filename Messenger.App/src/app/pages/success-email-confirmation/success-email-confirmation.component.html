<p class="small fw-bold mt-2 pt-1 mb-0">
  <a [routerLink]="['/login']" class="btn btn-primary">Sign in</a>
</p>

<div *ngIf="success === true" class="confirmation-message alert alert-success">
  <p>Email is successfully submitted</p>
</div>
<div *ngIf="errorMessage !== null" class="alert alert-danger" role="alert">
  {{ errorMessage }}
</div>
