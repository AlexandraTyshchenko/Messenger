<div class="modal-header">
  <h4 class="modal-title">Participants</h4>
</div>

<div *ngIf="participants.length > 0" class="mt-3">
  <ul class="list-group">
    <li
      *ngFor="let participant of participants"
      class="list-group-item d-flex align-items-center"
    >
      <!-- User Image -->
      <div class="me-3"> 
          <img
            *ngIf="participant.userInfo.imgUrl; else defaultImage"
            [src]="participant.userInfo.imgUrl"
            alt="Default Logo"
            width="40"
            height="40"
            class="rounded-circle"
            role="img"
            aria-label="default logo"
          />
          <ng-template #defaultImage>
            <img
              [src]="defaultImageUrl"
              alt="Default Logo"
              width="40"
              height="40"
              class="bi me-3 rounded-image sender-image"
              role="img"
              aria-label="default logo"
            />
          </ng-template>
      </div>

      <!-- User Info and Role -->
      <div class="flex-grow-1">
        <div>{{ participant.userInfo.userName }}</div>
        <div *ngIf="participant.role === 1" class="text-muted">Admin</div>
      </div>

      <!-- Delete Icon (Trash) -->
      <div
        *ngIf="isAdmin && userId !== participant.userInfo.id"
        class="ms-auto"
        (click)="deleteParticipant(participant)"
      >
        <span class="trash">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-trash"
            viewBox="0 0 16 16"
          >
            <path
              d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"
            />
            <path
              d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"
            />
          </svg>
        </span>
      </div>
    </li>
  </ul>
</div>
