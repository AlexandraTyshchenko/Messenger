<div class="modal-header">
  <h4 class="modal-title">Add Participants</h4>
</div>

<div class="modal-body">
  <form [formGroup]="searchForm" class="mb-3">
    <div class="row">
      <div class="col-12">
        <label for="searchQuery" class="form-label">Search Query</label>
        <input
          type="text"
          id="searchQuery"
          class="form-control"
          formControlName="searchQuery"
          placeholder="Enter username"
        />
      </div>
    </div>
  </form>

  <div class="mb-3">
    <div class="row">
      <div class="col-12">
        <div class="d-flex flex-wrap">
          <span
            *ngFor="let user of selectedUsers"
            class="badge bg-primary me-2 mb-2"
          >
            {{ user.userName }}
            <svg
              (click)="select(user)"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-x"
              viewBox="0 0 16 16"
            >
              <path
                d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"
              />
            </svg>
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="container" infiniteScroll [scrollWindow]="false" (scrolled)="onScroll()">
    <div *ngIf="users.length > 0" class="mt-3">
      <ul class="list-group">
        <li
          *ngFor="let user of users"
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          <div class="d-flex align-items-center">
            <img
              *ngIf="user.imgUrl; else defaultImage"
              [src]="user.imgUrl"
              alt="Logo"
              width="40"
              height="40"
              class="bi me-3 rounded-image sender-image"
              role="img"
              aria-label="logo"
            />
            <ng-template #defaultImage>
              <img
                [src]="defaultImageUrl"
                alt="Default Logo"
                width="40"
                height="40"
                class="bi me-3 rounded-image sender-image"
                role="img"
                aria-label="default logo"
              />
            </ng-template>
            <span>{{ user.userName }}</span>
          </div>

          <div>
            <span class="badge bg-primary me-2 mb-2" *ngIf="isParticipant(user)">Already in conversation</span>
            <input
              *ngIf="!isParticipant(user)"
              class="form-check-input ms-3"
              (click)="select(user)"
              type="checkbox"
              [checked]="isSelected(user)"
            />
          </div>
        </li>
      </ul>
    </div>
  </div>
</div>

<div *ngIf="errorMessage !== null" class="alert alert-danger" role="alert">
  {{ errorMessage }}
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-success" (click)="submit()">Confirm</button>
  <button type="button" class="btn btn-secondary" (click)="close()">Close</button>
</div>
