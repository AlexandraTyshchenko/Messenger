<div class="modal-body">
  <form [formGroup]="searchForm">
    <div class="mb-3">
      <label for="searchQuery" class="form-label">Search Query</label>
      <input
        type="text"
        id="searchQuery"
        class="form-control"
        formControlName="searchQuery"
        placeholder="Enter username"
      />
    </div>
  </form>

  <div
    class="container"
    infiniteScroll
    [scrollWindow]="false"
    (scrolled)="onScroll()"
  >
    <div *ngIf="users.length > 0" class="mt-3">
      <ul class="list-group">
        <li
          *ngFor="let user of users"
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          <img
            *ngIf="user.imgUrl; else defaultImage"
            [src]="user.imgUrl"
            alt="Logo"
            width="40"
            height="40"
            class="bi me-3 rounded-image sender-image"
            role="img"
            aria-label="logo"
          />
          <ng-template #defaultImage>
            <img
              [src]="defaultImageUrl"
              alt="Default Logo"
              width="40"
              height="40"
              class="bi me-3 rounded-image sender-image"
              role="img"
              aria-label="default logo"
            />
          </ng-template>
          {{ user.userName }}
          <div (click)="createPrivateConversation(user.id)">
            <svg class="pen-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="blue" viewBox="0 0 16 16">
              <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>
            </svg>
          </div>
    
          
        </li>
      </ul>
    </div>
  </div>
</div>
