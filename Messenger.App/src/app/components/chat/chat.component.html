<div
  class="container"
  #scrollContainer
  infiniteScroll
  [scrollWindow]="false"
  (scrolledUp)="onScroll()"
>
  <div class="row clearfix">
    <div class="col-lg-12">
      <div class="chat">
        <div class="chat-header clearfix">
          <div class="row">
            <div class="col-lg-6">
              <div class="d-flex align-items-center">
                <app-conversation-item
                  [conversation]="conversation"
                ></app-conversation-item>
                <div *ngIf="conversation.group" ngbDropdown>
                  <div
                    class="three-dots"
                    ngbDropdownToggle
                    id="dropdownMenuButton"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      fill="currentColor"
                      class="bi bi-three-dots-vertical"
                      viewBox="0 0 16 16"
                    >
                      <path
                        d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"
                      />
                    </svg>
                    <ul ngbDropdownMenu aria-labelledby="dropdownMenuButton">
                      <li>
                        <a (click)="showParticipants()" ngbDropdownItem
                          >Show all participants</a
                        >
                      </li>
                      <li>
                        <a (click)="addParticipants()" ngbDropdownItem
                          >Add participants</a
                        >
                      </li>
                      <li>
                        <a (click)="leaveConversation()" ngbDropdownItem
                          >Leave Conversation</a
                        >
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="chat-history">
          <app-message
            *ngFor="let message of messages"
            [myMessage]="message.sender?.id === currentUserId"
            [message]="message"
          ></app-message>
        </div>
        <app-file-upload
          (fileSelected)="onFileSelected($event)"
          [messageText]="this.messageForm.value.message"
          [conversationId] ="conversation.id"
        ></app-file-upload>

        <div class="chat-message clearfix">
          <form [formGroup]="messageForm" (ngSubmit)="sendMessage()">
            <div class="input-group mb-0 input-group-with-icon">
              <input
                type="text"
                class="form-control"
                placeholder="Enter text here..."
                formControlName="message"
              />
              <!-- Hidden File Input -->
              <button
                type="submit"
                class="btn"
                style="background-color: transparent"
                [disabled]="messageForm.invalid"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  fill="currentColor"
                  class="bi bi-send-arrow-up"
                  viewBox="0 0 16 16"
                >
                  <path
                    fill-rule="evenodd"
                    d="M15.854.146a.5.5 0 0 1 .11.54l-2.8 7a.5.5 0 1 1-.928-.372l1.895-4.738-7.494 7.494 1.376 2.162a.5.5 0 1 1-.844.537l-1.531-2.407L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM5.93 9.363l7.494-7.494L1.591 6.602z"
                  />
                  <path
                    fill-rule="evenodd"
                    d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.354-5.354a.5.5 0 0 0-.722.016l-1.149 1.25a.5.5 0 1 0 .737.676l.28-.305V14a.5.5 0 0 0 1 0v-1.793l.396.397a.5.5 0 0 0 .708-.708z"
                  />
                </svg>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
