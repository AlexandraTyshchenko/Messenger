version: '3.4'

services:
  messenger.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - "8080:8080"
      # - "5001:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  messenger.image.api:
   environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # - ASPNETCORE_URLS=http://+:8080
   ports:
       - "8090:8090"
   volumes:
       - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
       - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
